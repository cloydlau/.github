name: "\U0001F4A1 Feature Proposal"
description: Suggest new features for consideration
body:
  - type: markdown
    attributes:
      value: |
        🙏 Thanks for your interest and taking the time to fill out this feature proposal!
        Please consider starring ⭐ to support our ongoing maintenance if you find it useful or your proposal was resolved afterwards 🆘
        > [!Tip]
        > [Open Source Software is served "as-is"](https://antfu.me/posts/why-reproductions-are-required#open-source-software-is-served-as-is), so please keep in mind that <a href="https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/proposing-changes-to-your-work-with-pull-requests/creating-a-pull-request"><img alt="PRs Welcome" src="https://img.shields.io/badge/PRs-welcome-brightgreen.svg?logo=data:image/svg+xml;base64,"></a>
        > ⚠️ Consensus should be reached through discussion first if the changes are significant
  - type: checkboxes
    attributes:
      label: "Before you start, please make sure to:"
      options:
      - label: Read the document
        required: true
      - label: Have tried the latest version
        required: true
      - label: Search to see if your proposal already exists
        required: true
      - label: Look for Q&A through appropriate channels like [Stack Overflow](https://stackoverflow.com/questions/ask) and [ChatGPT](https://chat.openai.com)
        required: false
  - type: markdown
    attributes:
      value: |
        > [!Caution]
        > Please ensure not to use this for unrelated purposes like consulting, otherwise it can be closed without further notice
  - type: textarea
    id: problem-description
    attributes:
      label: What problem does this feature solve?
      description: |
        Explain your use case, context, and rationale behind this feature proposal. More importantly, what is the **end user experience** you are trying to build that led to the need for this feature?
      placeholder: Problem description
    validations:
      required: true
  - type: textarea
    id: proposed-API
    attributes:
      label: What does the proposed API look like?
      description: |
        Describe how you propose to solve the problem and provide code samples of how the API would work once implemented. Note that you can use [Markdown](https://guides.github.com/features/mastering-markdown) to format your code blocks
      placeholder: Assumed API
    validations:
      required: true
